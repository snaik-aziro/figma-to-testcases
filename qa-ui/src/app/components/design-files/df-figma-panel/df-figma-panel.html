<div class="figma-panel" role="region" aria-label="Figma connection">

  <div class="panel-head">
    <h3 class="panel-title">Connect Figma Design</h3>
    <button
      mat-stroked-button
      (click)="figmaFetch()"
      [disabled]="figmaForm.invalid"
    >
      Test Connection
    </button>
  </div>

  <!-- ✅ FormGroup wrapper -->
  <form class="form-grid" [formGroup]="figmaForm">

    <div class="half">
      <label class="form-label">File URL</label>
      <input
        class="form-control form-control-compact"
        placeholder="https://www.figma.com/file/..."
        formControlName="fileUrlOrId"
      />

      <label class="form-label">Access Token</label>
      <input
        type="text"
        class="form-control form-control-compact"
        placeholder="figma_access_token"
        formControlName="token"
      />
    </div>

    <div class="half">
      <label class="form-label">Select Figma Pages</label>
      <select
        class="form-select form-select-compact"
        formControlName="page"
      >
        <option>All Pages</option>
        <option>Login</option>
        <option>Dashboard</option>
        <option>Cart</option>
      </select>
    </div>

    <!-- ✅ MOVE CHECKBOX HERE -->
    <div class="options">
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          id="cacheCheck"
          formControlName="cache"
        />
        <label class="form-check-label" for="cacheCheck">
          Cache design for reuse
        </label>
      </div>

      <button class="link-btn" type="button">
        <mat-icon fontSet="material-icons-outlined">visibility</mat-icon>
        <span>View cached designs</span>
      </button>
    </div>

  </form>
  <div class="alert error" role="alert">
    <mat-icon fontSet="material-icons-outlined">error_outline</mat-icon>
    <div class="text">
      <div class="title">Unable to fetch Figma file.</div>
      <ul class="m-0">
        <li>Check access token permissions</li>
        <li>Ensure file access is enabled</li>
      </ul>
    </div>
  </div>

</div>
