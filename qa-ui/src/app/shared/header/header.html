<mat-toolbar class="app-header" role="banner">
  <div class="container-fluid header-container grid-3">

    <!-- Left: Brand -->
    <div class="left-section">
      <img class="app-logo" src="../../../assets/logo.svg" alt="logo" />
    </div>

    <!-- Center: Title + Subtitle -->
    <div class="center-section">
      <div class="title fw-semibold">QA Test Generator</div>
      <div class="subtitle text-muted small">
        AI‑Powered Test Case Generation from Figma &amp; PRD Documents
      </div>
    </div>

    <!-- Right: Help | Divider | Notifications | Divider | Profile -->
    <div class="right-icons d-flex align-items-center">

      <!-- Help -->
      <button type="button" mat-icon-button class="icon-btn" matTooltip="Help" aria-label="Help" (click)="onHelp()">
        <mat-icon fontSet="material-icons-outlined">help_outline</mat-icon>
      </button>

      <mat-divider class="vertical-divider" vertical aria-hidden="true"></mat-divider>

      <!-- Notifications -->
      <button type="button" mat-icon-button class="icon-btn" matTooltip="Notifications" aria-label="Notifications"
        (click)="onNotification()" [matBadge]="unreadCount ?? 0" matBadgeOverlap="false" matBadgeColor="primary">
        <mat-icon fontSet="material-icons-outlined">notifications_none</mat-icon>
      </button>

      <mat-divider class="vertical-divider" vertical aria-hidden="true"></mat-divider>

      <!-- Profile -->
      <button type="button" class="profile" [matMenuTriggerFor]="profileMenu" aria-label="Open profile menu">
        @if (avatarUrl) {
        <img class="avatar" [src]="avatarUrl" alt="Avatar" />
        } @else {
        <span class="avatar avatar--initials">{{ userInitials }}</span>
        }

        <mat-icon class="profile__chev" fontSet="material-icons-outlined">expand_more</mat-icon>
      </button>

      <!-- Profile Menu -->
      <mat-menu #profileMenu="matMenu" xPosition="before" yPosition="below">
        <button mat-menu-item>
          <mat-icon fontSet="material-icons-outlined">person</mat-icon>
          <span>{{ userName }}</span>
        </button>
        <!-- <button mat-menu-item>
          <mat-icon fontSet="material-icons-outlined">settings</mat-icon>
          <span>Settings</span>
        </button>  -->
        <mat-divider></mat-divider>
        <button mat-menu-item>
          <mat-icon fontSet="material-icons-outlined">logout</mat-icon>
          <span>Sign out</span>
        </button>
      </mat-menu>

    </div>

  </div>
</mat-toolbar>
